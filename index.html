<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Visão IA</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"/>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;700;800&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet"/>
  <style>
    :root {
      --bg: #0a0a0f;
      --surface: #111118;
      --surface2: #1a1a26;
      --border: #2a2a3d;
      --accent: #7c3aed;
      --accent2: #06b6d4;
      --accent3: #10b981;
      --text: #e8e8f0;
      --muted: #6b6b85;
      --glow: rgba(124, 58, 237, 0.25);
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'DM Mono', monospace;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: flex-start;
      padding: 2rem 1rem 4rem;
      overflow-x: hidden;
    }

    /* Background grid */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image:
        linear-gradient(rgba(124,58,237,0.04) 1px, transparent 1px),
        linear-gradient(90deg, rgba(124,58,237,0.04) 1px, transparent 1px);
      background-size: 40px 40px;
      pointer-events: none;
      z-index: 0;
    }

    .wrapper {
      position: relative;
      z-index: 1;
      width: 100%;
      max-width: 620px;
    }

    /* Header */
    .site-header {
      text-align: center;
      margin-bottom: 2.5rem;
    }

    .site-header .badge-chip {
      display: inline-block;
      background: rgba(124,58,237,0.15);
      border: 1px solid rgba(124,58,237,0.4);
      color: #a78bfa;
      font-family: 'DM Mono', monospace;
      font-size: 0.7rem;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      padding: 0.3rem 0.9rem;
      border-radius: 999px;
      margin-bottom: 1rem;
    }

    .site-header h1 {
      font-family: 'Syne', sans-serif;
      font-weight: 800;
      font-size: clamp(2rem, 6vw, 3.2rem);
      line-height: 1.05;
      background: linear-gradient(135deg, #c4b5fd 0%, #67e8f9 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      margin-bottom: 0.6rem;
    }

    .site-header p {
      color: var(--muted);
      font-size: 0.82rem;
      letter-spacing: 0.05em;
    }

    /* Card */
    .card-panel {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 2rem;
      box-shadow: 0 0 60px rgba(124,58,237,0.08), 0 20px 40px rgba(0,0,0,0.4);
    }

    /* Start button */
    .btn-start {
      width: 100%;
      padding: 1rem 2rem;
      background: linear-gradient(135deg, #7c3aed, #06b6d4);
      border: none;
      border-radius: 14px;
      color: #fff;
      font-family: 'Syne', sans-serif;
      font-weight: 700;
      font-size: 1rem;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      cursor: pointer;
      position: relative;
      overflow: hidden;
      transition: transform 0.2s, box-shadow 0.2s;
      box-shadow: 0 4px 24px rgba(124,58,237,0.35);
    }

    .btn-start::before {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(135deg, rgba(255,255,255,0.15), transparent);
      opacity: 0;
      transition: opacity 0.2s;
    }

    .btn-start:hover { transform: translateY(-2px); box-shadow: 0 8px 32px rgba(124,58,237,0.5); }
    .btn-start:hover::before { opacity: 1; }
    .btn-start:active { transform: translateY(0); }

    .btn-start .icon {
      display: inline-block;
      width: 20px;
      height: 20px;
      margin-right: 10px;
      vertical-align: middle;
      position: relative;
      top: -1px;
    }

    .btn-start.loading {
      pointer-events: none;
      background: linear-gradient(135deg, #5b21b6, #0891b2);
    }

    /* Webcam section */
    #webcam-section {
      display: none;
      margin-top: 1.8rem;
    }

    .webcam-frame {
      border-radius: 14px;
      overflow: hidden;
      border: 1px solid var(--border);
      background: #000;
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
    }

    .webcam-frame::after {
      content: '';
      position: absolute;
      inset: 0;
      border-radius: 14px;
      box-shadow: inset 0 0 0 1px rgba(124,58,237,0.3);
      pointer-events: none;
    }

    #webcam-container canvas {
      display: block;
      width: 100% !important;
      height: auto !important;
      border-radius: 14px;
    }

    /* Live dot */
    .live-indicator {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      color: #10b981;
      font-size: 0.72rem;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      margin-bottom: 0.8rem;
    }

    .live-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: #10b981;
      animation: pulse-dot 1.5s infinite;
      box-shadow: 0 0 8px #10b981;
    }

    @keyframes pulse-dot {
      0%, 100% { opacity: 1; transform: scale(1); }
      50% { opacity: 0.5; transform: scale(0.8); }
    }

    /* Divider */
    .section-divider {
      border: none;
      border-top: 1px solid var(--border);
      margin: 1.8rem 0;
    }

    .section-label {
      font-size: 0.68rem;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 1.2rem;
    }

    /* Predictions */
    #label-container {
      display: flex;
      flex-direction: column;
      gap: 1rem;
    }

    .prediction-item {
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 0.9rem 1.1rem;
      transition: border-color 0.3s;
    }

    .prediction-item.active {
      border-color: rgba(124,58,237,0.6);
      box-shadow: 0 0 20px rgba(124,58,237,0.1);
    }

    .prediction-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 0.6rem;
    }

    .prediction-name {
      font-family: 'Syne', sans-serif;
      font-weight: 700;
      font-size: 0.88rem;
      color: var(--text);
    }

    .prediction-percent {
      font-family: 'DM Mono', monospace;
      font-size: 0.82rem;
      font-weight: 500;
      color: #a78bfa;
      min-width: 48px;
      text-align: right;
    }

    .progress-track {
      height: 6px;
      background: rgba(255,255,255,0.06);
      border-radius: 999px;
      overflow: hidden;
    }

    .progress-fill {
      height: 100%;
      border-radius: 999px;
      width: 0%;
      transition: width 0.25s ease, background 0.25s ease;
      background: linear-gradient(90deg, #7c3aed, #06b6d4);
    }

    .prediction-item.active .progress-fill {
      background: linear-gradient(90deg, #7c3aed, #10b981);
      box-shadow: 0 0 10px rgba(124,58,237,0.5);
    }

    /* Status message */
    #status-msg {
      text-align: center;
      color: var(--muted);
      font-size: 0.78rem;
      margin-top: 1.5rem;
      letter-spacing: 0.05em;
    }

    /* Responsive */
    @media (max-width: 480px) {
      .card-panel { padding: 1.4rem; }
      .site-header h1 { font-size: 1.9rem; }
    }
  </style>
</head>
<body>
  <div class="wrapper">

    <!-- Header -->
    <header class="site-header">
      <div class="badge-chip">Teachable Machine · TensorFlow.js</div>
      <h1>Visão IA</h1>
      <p>Classificação de imagem em tempo real via webcam</p>
    </header>

    <!-- Main card -->
    <div class="card-panel">

      <!-- Start button -->
      <button class="btn-start" id="btn-start" onclick="init()">
        <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
          <path d="M23 7l-7 5 7 5V7z"/>
          <rect x="1" y="5" width="15" height="14" rx="2"/>
        </svg>
        Ativar Câmera
      </button>

      <!-- Webcam + predictions -->
      <div id="webcam-section">

        <hr class="section-divider"/>

        <div class="live-indicator">
          <div class="live-dot"></div>
          Transmissão ao vivo
        </div>

        <div class="webcam-frame">
          <div id="webcam-container"></div>
        </div>

        <hr class="section-divider"/>

        <div class="section-label">Resultados da classificação</div>
        <div id="label-container"></div>

      </div>

      <p id="status-msg">Clique em "Ativar Câmera" para iniciar a análise.</p>
    </div>

  </div>

  <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@latest/dist/tf.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@teachablemachine/image@latest/dist/teachablemachine-image.min.js"></script>
  <script>
    const URL = "https://teachablemachine.withgoogle.com/models/lbGoWHhCs/";
    let model, webcam, labelContainer, maxPredictions;

    async function init() {
      const btn = document.getElementById("btn-start");
      btn.classList.add("loading");
      btn.innerHTML = `
        <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" style="animation:spin 1s linear infinite">
          <path d="M21 12a9 9 0 1 1-6.219-8.56"/>
        </svg>
        Carregando modelo...
      `;

      const style = document.createElement('style');
      style.textContent = '@keyframes spin { from{transform:rotate(0deg)} to{transform:rotate(360deg)} }';
      document.head.appendChild(style);

      document.getElementById("status-msg").textContent = "Solicitando acesso à câmera...";

      try {
        const modelURL    = URL + "model.json";
        const metadataURL = URL + "metadata.json";

        model = await tmImage.load(modelURL, metadataURL);
        maxPredictions = model.getTotalClasses();

        const flip = true;
        webcam = new tmImage.Webcam(400, 400, flip);
        await webcam.setup();
        await webcam.play();
        window.requestAnimationFrame(loop);

        document.getElementById("webcam-container").appendChild(webcam.canvas);

        // Show webcam section
        document.getElementById("webcam-section").style.display = "block";
        document.getElementById("status-msg").textContent = "Modelo ativo — analisando em tempo real.";

        // Build prediction items
        labelContainer = document.getElementById("label-container");
        labelContainer.innerHTML = "";

        const colors = [
          "linear-gradient(90deg,#7c3aed,#06b6d4)",
          "linear-gradient(90deg,#06b6d4,#10b981)",
          "linear-gradient(90deg,#f59e0b,#ef4444)",
          "linear-gradient(90deg,#ec4899,#a78bfa)",
          "linear-gradient(90deg,#10b981,#7c3aed)",
          "linear-gradient(90deg,#3b82f6,#06b6d4)",
        ];

        for (let i = 0; i < maxPredictions; i++) {
          const item = document.createElement("div");
          item.classList.add("prediction-item");
          item.id = `pred-item-${i}`;
          item.innerHTML = `
            <div class="prediction-header">
              <span class="prediction-name" id="pred-name-${i}">Classe ${i + 1}</span>
              <span class="prediction-percent" id="pred-pct-${i}">0%</span>
            </div>
            <div class="progress-track">
              <div class="progress-fill" id="pred-bar-${i}" style="background:${colors[i % colors.length]}"></div>
            </div>
          `;
          labelContainer.appendChild(item);
        }

        // Hide button
        btn.style.display = "none";

      } catch (err) {
        btn.classList.remove("loading");
        btn.innerHTML = `
          <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
            <path d="M23 7l-7 5 7 5V7z"/>
            <rect x="1" y="5" width="15" height="14" rx="2"/>
          </svg>
          Tentar novamente
        `;
        document.getElementById("status-msg").textContent = "Erro: permissão de câmera negada ou modelo indisponível.";
      }
    }

    async function loop() {
      webcam.update();
      await predict();
      window.requestAnimationFrame(loop);
    }

    async function predict() {
      const prediction = await model.predict(webcam.canvas);

      // Find top class
      let topIdx = 0;
      let topProb = 0;
      for (let i = 0; i < maxPredictions; i++) {
        if (prediction[i].probability > topProb) {
          topProb = prediction[i].probability;
          topIdx = i;
        }
      }

      for (let i = 0; i < maxPredictions; i++) {
        const prob    = prediction[i].probability;
        const pct     = Math.round(prob * 100);
        const item    = document.getElementById(`pred-item-${i}`);
        const nameEl  = document.getElementById(`pred-name-${i}`);
        const pctEl   = document.getElementById(`pred-pct-${i}`);
        const barEl   = document.getElementById(`pred-bar-${i}`);

        nameEl.textContent = prediction[i].className;
        pctEl.textContent  = pct + "%";
        barEl.style.width  = pct + "%";

        if (i === topIdx && topProb > 0.5) {
          item.classList.add("active");
        } else {
          item.classList.remove("active");
        }
      }
    }
  </script>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
